name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "Dockerfile"
      - "data/**"
      - "zameen_market_segments.csv"
      - "zameen_karachi_flats_today.csv"
      - "zameen_karachi_flats_last_7_days.csv"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK }}