name: Daily Scrape & Process

on:
  schedule:
    - cron: "0 2 * * *"  # 7AM PKT daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Chrome and ChromeDriver
        run: |
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable chromium-chromedriver
          google-chrome --version
          chromedriver --version

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper
        timeout-minutes: 50
        run: python scraper/automated_scraper.py

      - name: Run preprocessing
        run: python preprocessing.py

      - name: Run segmentation
        run: python market_segmentation.py

      - name: Run scoring
        run: python scoring.py

      - name: Commit updated CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.csv
          git diff --cached --quiet || git commit -m "data: daily update $(date -u +%Y-%m-%d)"
          git push