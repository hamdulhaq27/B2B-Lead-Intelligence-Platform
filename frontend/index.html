<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zameen Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #07090c;
      --surf: #0d1117;
      --surf2: #131920;
      --border: #1a2230;
      --border2: #223040;
      --accent: #00e5a0;
      --blue: #0094ff;
      --orange: #ff6b35;
      --yellow: #ffb800;
      --red: #ff4560;
      --text: #e4eaf0;
      --text2: #6a7e92;
      --text3: #3a4a5a;
      --mono: "JetBrains Mono", monospace;
      --display: "Syne", sans-serif;
      --r: 8px;
      --rl: 12px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--display); font-size: 14px; line-height: 1.5; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-track { background: var(--surf); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    body::before { content: ""; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,229,160,0.01) 2px, rgba(0,229,160,0.01) 4px); pointer-events: none; z-index: 9999; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
    @keyframes shimmer { from{background-position:-400px 0} to{background-position:400px 0} }
    .skel { background: linear-gradient(90deg, var(--surf) 25%, var(--surf2) 50%, var(--surf) 75%); background-size:800px 100%; animation: shimmer 1.3s infinite; border-radius: var(--r); }
    .fade { animation: fadeUp 0.35s ease both; }

    /* Layout */
    #app { display: flex; min-height: 100vh; }
    .sidebar { width: 210px; min-width: 210px; background: var(--surf); border-right: 1px solid var(--border); display:flex; flex-direction:column; padding: 24px 0; position:sticky; top:0; height:100vh; }
    .main { flex:1; min-width:0; padding: 32px 36px; }

    /* Sidebar */
    .brand { padding: 0 20px 28px; border-bottom: 1px solid var(--border); margin-bottom:12px; }
    .brand-sub { font-family:var(--mono); font-size:9px; color:var(--accent); letter-spacing:4px; margin-bottom:6px; }
    .brand-name { font-size:19px; font-weight:800; line-height:1.1; }
    .live-dot { display:inline-block; width:7px; height:7px; background:var(--accent); border-radius:50%; margin-left:4px; animation: pulse 2s infinite; vertical-align:middle; }
    .nav-link { display:flex; align-items:center; gap:10px; padding:9px 14px; margin: 0 8px 2px; border-radius:var(--r); color:var(--text2); text-decoration:none; font-weight:600; font-size:13px; cursor:pointer; border:none; background:none; width:calc(100% - 16px); text-align:left; transition: all 0.15s; border-left: 2px solid transparent; }
    .nav-link:hover { color:var(--text); background: rgba(255,255,255,0.04); }
    .nav-link.active { color:var(--accent); background: rgba(0,229,160,0.07); border-left-color:var(--accent); }
    .nav-icon { font-size:15px; width:18px; text-align:center; }
    .sidebar-footer { margin-top:auto; padding:14px 20px; border-top:1px solid var(--border); font-family:var(--mono); font-size:9px; color:var(--text3); line-height:1.9; }

    /* Page header */
    .page-label { font-family:var(--mono); font-size:9px; color:var(--accent); letter-spacing:3px; margin-bottom:6px; }
    .page-title { font-size:26px; font-weight:800; margin-bottom:4px; }
    .page-sub { color:var(--text2); font-size:12px; margin-bottom:28px; }

    /* Stat cards */
    .stats-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:28px; }
    .stat-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:20px 22px; position:relative; overflow:hidden; }
    .stat-card::before { content:""; position:absolute; top:0; left:0; right:0; height:2px; }
    .stat-label { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:2px; margin-bottom:10px; }
    .stat-value { font-family:var(--mono); font-size:28px; font-weight:700; line-height:1; }
    .stat-unit { font-size:11px; color:var(--text2); margin-left:3px; }

    /* Panels */
    .panel { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:22px; }
    .panel-label { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:2px; margin-bottom:4px; }
    .panel-title { font-weight:700; font-size:14px; margin-bottom:18px; }
    .two-col { display:grid; grid-template-columns:1fr 300px; gap:18px; margin-bottom:18px; }
    .two-equal { display:grid; grid-template-columns:1fr 1fr; gap:18px; margin-bottom:18px; }

    /* Table */
    .table-wrap { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; }
    .table-head { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--surf2); }
    th { padding:9px 16px; text-align:left; font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:2px; font-weight:500; }
    td { padding:11px 16px; border-bottom:1px solid var(--border); font-size:12px; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:rgba(255,255,255,0.02); }

    /* Score bar */
    .score-bar-wrap { display:flex; align-items:center; gap:8px; min-width:90px; }
    .score-bar-bg { flex:1; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; }
    .score-bar-fill { height:100%; border-radius:2px; }

    /* Badge */
    .badge { display:inline-block; border-radius:4px; padding:2px 8px; font-size:10px; font-weight:700; }

    /* Leads page */
    .filter-bar { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:14px 18px; margin-bottom:18px; display:flex; gap:14px; flex-wrap:wrap; align-items:flex-end; }
    .filter-group label { display:block; font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; margin-bottom:4px; }
    select, input[type=text], input[type=number] { background:var(--surf2); border:1px solid var(--border2); border-radius:var(--r); padding:7px 10px; color:var(--text); font-family:var(--display); font-size:12px; outline:none; }
    select:focus, input:focus { border-color: rgba(0,229,160,0.4); }

    .lead-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); margin-bottom:10px; overflow:hidden; border-left:3px solid transparent; transition: border-color 0.2s; }
    .lead-card-header { padding:16px 18px; display:flex; justify-content:space-between; align-items:flex-start; gap:14px; cursor:pointer; }
    .lead-card-body { padding:0 18px 16px; border-top:1px solid var(--border); padding-top:14px; display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
    .lead-detail-label { font-family:var(--mono); font-size:9px; color:var(--text3); letter-spacing:1px; margin-bottom:3px; }
    .lead-detail-val { font-size:12px; color:var(--text); }
    .pagination { display:flex; gap:6px; justify-content:center; margin-top:22px; }
    .page-btn { padding:5px 12px; border-radius:var(--r); border:1px solid var(--border2); background:var(--surf2); color:var(--text2); font-family:var(--mono); font-size:11px; cursor:pointer; }
    .page-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }
    .page-btn:hover:not(.active) { border-color:var(--border2); color:var(--text); }

    /* Location bars */
    .loc-row { display:flex; align-items:center; gap:10px; padding:7px 0; }
    .loc-bar-bg { flex:1; height:2px; background:var(--border); border-radius:1px; }
    .loc-bar-fill { height:100%; background:var(--accent); border-radius:1px; opacity:0.65; }
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-sub">PLATFORM</div>
      <div class="brand-name">ZAMEEN<br>INTEL<span class="live-dot"></span></div>
    </div>
    <button class="nav-link active" onclick="showPage('dashboard', this)"><span class="nav-icon">◈</span> Dashboard</button>
    <button class="nav-link" onclick="showPage('leads', this)"><span class="nav-icon">⬡</span> Leads</button>
    <button class="nav-link" onclick="showPage('analytics', this)"><span class="nav-icon">◉</span> Analytics</button>
    <div class="sidebar-footer">
      Karachi Real Estate<br>
      B2B Lead Intelligence<br>
      <span style="color:var(--accent);opacity:.7">● LIVE DATA</span>
    </div>
  </aside>
  <main class="main" id="main-content"></main>
</div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:8000' : 'https://b2b-lead-intelligence-platform.onrender.com';
const SEGMENT_COLORS = { "Budget Area":"#0094ff","Mid-Value Area":"#00e5a0","Premium Area":"#ffb800","Luxury Area":"#ff6b35" };

function fmt(n) {
  if (!n) return "–";
  if (n >= 10_000_000) return (n/10_000_000).toFixed(1)+"Cr";
  if (n >= 100_000) return (n/100_000).toFixed(1)+"L";
  return n.toLocaleString();
}

function scoreColor(s) {
  return s >= 70 ? "var(--accent)" : s >= 40 ? "var(--yellow)" : "var(--red)";
}

async function get(path) {
  const r = await fetch(API + path);
  return r.json();
}

// ── State ──────────────────────────────────────────────────
let state = { page: "dashboard", leadsFilters: { page:1, limit:20, sort_by:"lead_score", segment:"", min_score:"", location:"" } };

function showPage(name, btn) {
  state.page = name;
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Dashboard ──────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-label">KARACHI REAL ESTATE • LIVE INTELLIGENCE</div>
    <div class="page-title">Lead Dashboard</div>
    <div class="page-sub">Automated scraping · Scoring · Market segmentation</div>
    <div class="stats-grid" id="stats-grid">
      ${[...Array(5)].map(() => `<div class="stat-card"><div class="skel" style="height:18px;width:80px;margin-bottom:12px"></div><div class="skel" style="height:36px;width:100px"></div></div>`).join('')}
    </div>
    <div class="two-col" style="margin-bottom:18px">
      <div class="panel"><div class="panel-label">WEEKLY TREND</div><div class="panel-title">Daily Lead Volume</div><div id="trend-chart" style="height:180px" class="skel"></div></div>
      <div class="panel"><div class="panel-label">SEGMENTS</div><div class="panel-title">Market Split</div><div id="seg-chart"></div></div>
    </div>
    <div class="table-wrap">
      <div class="table-head"><div><div class="panel-label">RANKED</div><div style="font-weight:700">Top Scored Leads</div></div><button class="nav-link" style="width:auto;padding:6px 12px;font-size:11px;color:var(--accent)" onclick="showPage('leads',document.querySelectorAll('.nav-link')[1])">View all →</button></div>
      <div id="top-table"><table><thead><tr><th>PROPERTY</th><th>PRICE</th><th>SEGMENT</th><th>SCORE</th><th>POSTED</th></tr></thead><tbody>${[...Array(5)].map(()=>`<tr>${[...Array(5)].map(()=>`<td><div class="skel" style="height:14px;width:85%"></div></td>`).join('')}</tr>`).join('')}</tbody></table></div>
    </div>`;

  const [summary, trends, top] = await Promise.all([get('/api/summary'), get('/api/trends/weekly'), get('/api/leads/top?limit=8')]);

  // Stats
  const cards = [
    { label:"TOTAL LEADS", value: summary.total_leads ?? "–", color:"var(--accent)" },
    { label:"TODAY", value: summary.today_leads ?? "–", color:"var(--blue)" },
    { label:"AVG SCORE", value: summary.avg_lead_score ?? "–", unit:"/100", color:"var(--yellow)" },
    { label:"AVG PRICE", value: fmt(summary.avg_price), color:"var(--orange)" },
    { label:"VERIFIED AGENCIES", value: summary.verified_agencies ?? "–", color:"#9b59b6" },
  ];
  document.getElementById('stats-grid').innerHTML = cards.map(c => `
    <div class="stat-card fade" style="--c:${c.color}">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c.color};opacity:.7"></div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" style="color:${c.color}">${c.value}<span class="stat-unit">${c.unit||""}</span></div>
    </div>`).join('');

  // Trend chart (simple SVG bars)
  const days = trends.days || [], counts = trends.counts || [];
  const maxC = Math.max(...counts, 1);
  const W=560, H=160, PAD=32;
  const bw = (W - PAD*2) / (days.length || 1);
  const bars = days.map((d,i) => {
    const bh = ((counts[i]/maxC) * (H-40));
    const x = PAD + i*bw + bw*0.15;
    const y = H - bh - 20;
    return `<rect x="${x}" y="${y}" width="${bw*0.7}" height="${bh}" rx="3" fill="var(--accent)" opacity="0.75"/>
            <text x="${x+bw*0.35}" y="${H-4}" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="JetBrains Mono">${d.slice(5)}</text>
            <text x="${x+bw*0.35}" y="${y-5}" text-anchor="middle" font-size="9" fill="var(--accent)" font-family="JetBrains Mono">${counts[i]}</text>`;
  }).join('');
  document.getElementById('trend-chart').className = 'fade';
  document.getElementById('trend-chart').innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">${bars}</svg>`;

  // Segment donut (SVG)
  const segs = Object.entries(summary.segments || {});
  const total = segs.reduce((a,[,v])=>a+v,0)||1;
  let cum = 0;
  const R=55, cx=80, cy=75;
  const paths = segs.map(([name,val]) => {
    const pct = val/total;
    const start = cum * 2 * Math.PI - Math.PI/2;
    cum += pct;
    const end = cum * 2 * Math.PI - Math.PI/2;
    const x1=cx+R*Math.cos(start), y1=cy+R*Math.sin(start);
    const x2=cx+R*Math.cos(end), y2=cy+R*Math.sin(end);
    const large = pct > 0.5 ? 1 : 0;
    const color = SEGMENT_COLORS[name]||"#aaa";
    return `<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${color}" opacity="0.85"/>`;
  }).join('');
  const legend = segs.map(([name,val])=>`
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
      <div style="width:8px;height:8px;border-radius:2px;background:${SEGMENT_COLORS[name]||'#aaa'};flex-shrink:0"></div>
      <span style="font-size:11px;color:var(--text2);flex:1">${name}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text)">${val}</span>
    </div>`).join('');
  document.getElementById('seg-chart').innerHTML = `
    <div style="display:flex;gap:16px;align-items:center">
      <svg viewBox="0 0 160 150" style="width:140px;height:130px;flex-shrink:0">${paths}<circle cx="${cx}" cy="${cy}" r="28" fill="var(--surf)"/></svg>
      <div style="flex:1">${legend}</div>
    </div>`;

  // Top leads table
  document.getElementById('top-table').innerHTML = `<table><thead><tr><th>PROPERTY</th><th>PRICE</th><th>SEGMENT</th><th>SCORE</th><th>POSTED</th></tr></thead><tbody>
    ${top.map(l=>{
      const s=Math.round(l.lead_score||0), c=scoreColor(s), sc=SEGMENT_COLORS[l.market_segment]||"var(--text2)";
      return `<tr>
        <td><div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px">${l.title||"—"}</div><div style="font-size:10px;color:var(--text3)">${l.location||""}</div></td>
        <td style="font-family:var(--mono);color:var(--blue);font-size:12px">${fmt(l.price)}</td>
        <td><span class="badge" style="background:${sc}18;color:${sc};border:1px solid ${sc}30">${l.market_segment||"—"}</span></td>
        <td><div class="score-bar-wrap"><div class="score-bar-bg"><div class="score-bar-fill" style="width:${s}%;background:${c}"></div></div><span style="font-family:var(--mono);font-size:11px;color:${c};min-width:24px">${s}</span></div></td>
        <td style="font-size:11px;color:var(--text3)">${l.posted_date||"—"}</td>
      </tr>`;
    }).join('')}
  </tbody></table>`;
}

// ── Leads ──────────────────────────────────────────────────
async function renderLeads() {
  const el = document.getElementById('main-content');
  const f = state.leadsFilters;
  el.innerHTML = `
    <div class="page-label">LIVE DATABASE</div>
    <div class="page-title">All Leads</div>
    <div class="page-sub" id="leads-sub">Loading...</div>
    <div class="filter-bar">
      <div class="filter-group"><label>SEGMENT</label>
        <select onchange="filterLeads('segment',this.value)">
          <option value="">All</option>
          ${["Budget Area","Mid-Value Area","Premium Area","Luxury Area"].map(s=>`<option value="${s}" ${f.segment===s?"selected":""}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="filter-group"><label>MIN SCORE</label>
        <input type="number" placeholder="0–100" style="width:90px" value="${f.min_score||""}" oninput="filterLeads('min_score',this.value)">
      </div>
      <div class="filter-group"><label>LOCATION</label>
        <input type="text" placeholder="Search..." style="width:150px" value="${f.location||""}" oninput="filterLeads('location',this.value)">
      </div>
      <div class="filter-group"><label>SORT BY</label>
        <select onchange="filterLeads('sort_by',this.value)">
          <option value="lead_score" ${f.sort_by==="lead_score"?"selected":""}>Score</option>
          <option value="price" ${f.sort_by==="price"?"selected":""}>Price</option>
          <option value="area_sqft" ${f.sort_by==="area_sqft"?"selected":""}>Area</option>
        </select>
      </div>
    </div>
    <div id="leads-list">${[...Array(5)].map(()=>`<div class="skel" style="height:80px;margin-bottom:10px;border-radius:var(--rl)"></div>`).join('')}</div>
    <div class="pagination" id="leads-pagination"></div>`;

  const params = new URLSearchParams(Object.fromEntries(Object.entries(f).filter(([,v])=>v!==""))).toString();
  const data = await get(`/api/leads?${params}`);

  document.getElementById('leads-sub').textContent = `${data.total?.toLocaleString()} total leads · page ${data.page}/${data.pages}`;

  document.getElementById('leads-list').innerHTML = (data.leads||[]).map(l => {
    const s=Math.round(l.lead_score||0), c=scoreColor(s), sc=SEGMENT_COLORS[l.market_segment]||"var(--text2)";
    return `<div class="lead-card fade" style="border-left-color:${c}">
      <div class="lead-card-header" onclick="toggleCard(this)">
        <div style="flex:1;min-width:0">
          <div style="font-weight:700;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${l.title||"Untitled"}</div>
          <div style="display:flex;gap:10px;align-items:center;margin-top:4px;flex-wrap:wrap">
            <span style="font-family:var(--mono);font-size:12px;color:var(--blue);font-weight:600">${fmt(l.price)}</span>
            <span style="font-size:11px;color:var(--text3)">${l.area_sqft?Math.round(l.area_sqft)+" sqft":""} ${l.bedrooms?`• ${Math.round(l.bedrooms)} bed`:""}</span>
            <span class="badge" style="background:${sc}18;color:${sc};border:1px solid ${sc}30">${l.market_segment||"—"}</span>
          </div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">${l.location||"—"}${l.verified_agency?.toLowerCase()==="verified"?" · ✓ Verified":""}</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--mono);font-size:24px;font-weight:700;color:${c}">${s}</div>
          <div style="font-family:var(--mono);font-size:9px;color:var(--text3);letter-spacing:1px">SCORE</div>
        </div>
      </div>
      <div class="lead-card-body" style="display:none">
        ${[["Agent",l.agent_name],["Agency",l.agency_name],["Phone",l.phone_number],["Email",l.email],["Posted",l.posted_date],["Listings",l.total_agent_listings]].map(([k,v])=>`
          <div><div class="lead-detail-label">${k}</div><div class="lead-detail-val">${v||"—"}</div></div>`).join('')}
        ${l.link?`<div style="grid-column:1/-1;padding-top:8px;border-top:1px solid var(--border);margin-top:4px"><a href="${l.link}" target="_blank" style="font-family:var(--mono);font-size:11px;color:var(--accent);text-decoration:none">View on Zameen.com →</a></div>`:""}
      </div>
    </div>`;
  }).join('');

  // Pagination
  const pages = Math.min(data.pages||0, 8);
  document.getElementById('leads-pagination').innerHTML = [...Array(pages)].map((_,i)=>{
    const p=i+1;
    return `<button class="page-btn ${p===f.page?"active":""}" onclick="goPage(${p})">${p}</button>`;
  }).join('');
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  body.style.display = body.style.display === "none" ? "grid" : "none";
}

function filterLeads(key, val) {
  state.leadsFilters[key] = val;
  state.leadsFilters.page = 1;
  renderLeads();
}

function goPage(p) {
  state.leadsFilters.page = p;
  renderLeads();
}

// ── Analytics ──────────────────────────────────────────────
async function renderAnalytics() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-label">INTELLIGENCE</div>
    <div class="page-title">Analytics</div>
    <div class="page-sub">Segment performance, trends and location insights</div>
    <div class="two-equal">
      <div class="panel"><div class="panel-label">PRICING</div><div class="panel-title">Avg Price by Segment</div><div id="price-chart" style="height:180px" class="skel"></div></div>
      <div class="panel"><div class="panel-label">QUALITY</div><div class="panel-title">Avg Score by Segment</div><div id="score-chart" style="height:180px" class="skel"></div></div>
    </div>
    <div class="panel"><div class="panel-label">GEO ANALYSIS</div><div class="panel-title">Top Locations by Volume</div><div id="loc-list"></div></div>`;

  const [segs, locs] = await Promise.all([get('/api/trends/segments'), get('/api/trends/locations')]);

  // Price bars (SVG)
  function barChart(containerId, data, key, formatFn, colorFn) {
    const max = Math.max(...data.map(d=>d[key]||0), 1);
    const W=400, H=160, PAD=40, bw=(W-PAD*2)/data.length;
    const bars = data.map((d,i)=>{
      const bh = ((d[key]||0)/max)*(H-50);
      const x=PAD+i*bw+bw*0.1, y=H-bh-24;
      const c=colorFn(d);
      const label=d.market_segment?.replace(" Area","");
      return `<rect x="${x}" y="${y}" width="${bw*0.8}" height="${bh}" rx="3" fill="${c}" opacity="0.8"/>
              <text x="${x+bw*0.4}" y="${H-6}" text-anchor="middle" font-size="9" fill="var(--text3)" font-family="JetBrains Mono">${label}</text>
              <text x="${x+bw*0.4}" y="${y-5}" text-anchor="middle" font-size="9" fill="${c}" font-family="JetBrains Mono">${formatFn(d[key])}</text>`;
    }).join('');
    document.getElementById(containerId).className='fade';
    document.getElementById(containerId).innerHTML=`<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">${bars}</svg>`;
  }

  barChart('price-chart', segs, 'avg_price', fmt, d=>SEGMENT_COLORS[d.market_segment]||"var(--accent)");
  barChart('score-chart', segs, 'avg_score', v=>Math.round(v||0), d=>SEGMENT_COLORS[d.market_segment]||"var(--accent)");

  // Locations
  const maxLoc = locs[0]?.count||1;
  document.getElementById('loc-list').innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px 24px">
    ${locs.slice(0,16).map((l,i)=>`
      <div class="loc-row">
        <span style="font-family:var(--mono);font-size:9px;color:var(--text3);min-width:18px;text-align:right">${i+1}</span>
        <div style="flex:1;min-width:0">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${l.location||"Unknown"}</span>
            <span style="font-family:var(--mono);font-size:10px;color:var(--accent);margin-left:8px">${l.count}</span>
          </div>
          <div class="loc-bar-bg"><div class="loc-bar-fill" style="width:${(l.count/maxLoc*100).toFixed(0)}%"></div></div>
        </div>
      </div>`).join('')}
  </div>`;
}

// ── Router ─────────────────────────────────────────────────
function render() {
  document.getElementById('main-content').innerHTML = '';
  if (state.page === 'dashboard') renderDashboard();
  else if (state.page === 'leads') renderLeads();
  else if (state.page === 'analytics') renderAnalytics();
}

render();
</script>
</body>
</html>
