<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zameen Intel · B2B Lead Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #06080b;
      --surf:    #0c1118;
      --surf2:   #111820;
      --surf3:   #162030;
      --border:  #18263a;
      --border2: #1e3048;
      --accent:  #00e5a0;
      --accent2: #00b87d;
      --blue:    #2d9cff;
      --blue2:   #0078e0;
      --orange:  #ff6b35;
      --yellow:  #f5c518;
      --red:     #ff4560;
      --purple:  #9b6dff;
      --text:    #dce9f5;
      --text2:   #5e7a93;
      --text3:   #2d4258;
      --mono:    "JetBrains Mono", monospace;
      --sans:    "Syne", sans-serif;
      --r:       6px;
      --rl:      10px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.55; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--surf); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
    body::before { content:""; position:fixed; inset:0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,229,160,0.008) 3px, rgba(0,229,160,0.008) 6px); pointer-events:none; z-index:9999; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.25;} }
    @keyframes shimmer { from{background-position:-600px 0} to{background-position:600px 0} }
    @keyframes spin { to { transform: rotate(360deg); } }
    .skel { background: linear-gradient(90deg, var(--surf) 25%, var(--surf2) 50%, var(--surf) 75%); background-size:800px 100%; animation: shimmer 1.4s infinite; border-radius: var(--r); }
    .fade { animation: fadeUp 0.3s ease both; }
    .stagger-1 { animation-delay: .05s; }
    .stagger-2 { animation-delay: .1s; }
    .stagger-3 { animation-delay: .15s; }

    /* ── Layout ── */
    #app { display:flex; min-height:100vh; }
    .sidebar { width:220px; min-width:220px; background:var(--surf); border-right:1px solid var(--border); display:flex; flex-direction:column; padding:0; position:sticky; top:0; height:100vh; overflow-y:auto; }
    .main { flex:1; min-width:0; padding:28px 32px 48px; }

    /* ── Sidebar ── */
    .brand { padding:22px 20px 20px; border-bottom:1px solid var(--border); }
    .brand-eyebrow { font-family:var(--mono); font-size:8px; color:var(--accent); letter-spacing:4px; margin-bottom:8px; display:flex; align-items:center; gap:6px; }
    .live-dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; animation: pulse 2s infinite; }
    .brand-name { font-size:20px; font-weight:800; line-height:1.1; letter-spacing:-.5px; }
    .brand-sub { font-family:var(--mono); font-size:9px; color:var(--text3); margin-top:4px; }
    .nav-section { padding:16px 12px 6px; }
    .nav-section-label { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:3px; padding:0 8px; margin-bottom:4px; }
    .nav-link { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--r); color:var(--text2); text-decoration:none; font-weight:600; font-size:12px; cursor:pointer; border:none; background:none; width:100%; text-align:left; transition:all .15s; border-left:2px solid transparent; }
    .nav-link:hover { color:var(--text); background:rgba(255,255,255,.035); }
    .nav-link.active { color:var(--accent); background:rgba(0,229,160,.07); border-left-color:var(--accent); }
    .nav-icon { font-size:14px; width:16px; text-align:center; flex-shrink:0; }
    .sidebar-footer { margin-top:auto; padding:14px 20px; border-top:1px solid var(--border); }
    .sf-row { font-family:var(--mono); font-size:8px; color:var(--text3); line-height:2; }
    .sf-stat { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
    .sf-stat-label { font-family:var(--mono); font-size:8px; color:var(--text3); }
    .sf-stat-val { font-family:var(--mono); font-size:10px; color:var(--accent); font-weight:600; }

    /* ── Page header ── */
    .page-eyebrow { font-family:var(--mono); font-size:8px; color:var(--accent); letter-spacing:4px; margin-bottom:6px; }
    .page-title { font-size:24px; font-weight:800; margin-bottom:3px; letter-spacing:-.3px; }
    .page-sub { color:var(--text2); font-size:11px; margin-bottom:24px; font-family:var(--mono); }
    .page-header-row { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:24px; }
    .page-header-meta { text-align:right; font-family:var(--mono); font-size:9px; color:var(--text3); line-height:1.8; }

    /* ── Stat cards ── */
    .stats-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:22px; }
    .stat-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:16px 18px; position:relative; overflow:hidden; }
    .stat-accent-bar { position:absolute; top:0; left:0; right:0; height:2px; }
    .stat-label { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:2px; margin-bottom:8px; }
    .stat-value { font-family:var(--mono); font-size:24px; font-weight:700; line-height:1; letter-spacing:-1px; }
    .stat-unit { font-size:10px; color:var(--text2); margin-left:2px; font-weight:400; letter-spacing:0; }
    .stat-delta { font-family:var(--mono); font-size:9px; margin-top:6px; color:var(--text3); }

    /* ── Panels ── */
    .panel { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:20px; }
    .panel-eyebrow { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:2px; margin-bottom:3px; }
    .panel-title { font-weight:700; font-size:13px; margin-bottom:16px; }
    .two-col { display:grid; grid-template-columns:1fr 290px; gap:16px; margin-bottom:16px; }
    .two-equal { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
    .three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; margin-bottom:16px; }

    /* ── Table ── */
    .table-wrap { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; margin-bottom:16px; }
    .table-head { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--surf2); }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--surf2); }
    th { padding:8px 14px; text-align:left; font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:2px; font-weight:500; white-space:nowrap; }
    td { padding:10px 14px; border-bottom:1px solid var(--border); font-size:11px; vertical-align:middle; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:rgba(255,255,255,.018); }

    /* ── Score bar ── */
    .score-bar-wrap { display:flex; align-items:center; gap:7px; }
    .score-bar-bg { flex:1; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; min-width:50px; }
    .score-bar-fill { height:100%; border-radius:2px; }

    /* ── Badge ── */
    .badge { display:inline-flex; align-items:center; border-radius:4px; padding:2px 7px; font-size:9px; font-weight:700; font-family:var(--mono); white-space:nowrap; }
    .badge-dot { width:5px; height:5px; border-radius:50%; margin-right:5px; flex-shrink:0; }

    /* ── Filter bar ── */
    .filter-bar { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:14px 16px; margin-bottom:16px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .filter-group label { display:block; font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:1.5px; margin-bottom:4px; }
    select, input[type=text], input[type=number] { background:var(--surf2); border:1px solid var(--border2); border-radius:var(--r); padding:6px 10px; color:var(--text); font-family:var(--mono); font-size:11px; outline:none; transition:border-color .15s; }
    select:focus, input:focus { border-color:rgba(0,229,160,.45); box-shadow:0 0 0 2px rgba(0,229,160,.08); }
    .filter-reset { background:transparent; border:1px solid var(--border2); border-radius:var(--r); padding:6px 12px; color:var(--text3); font-family:var(--mono); font-size:9px; cursor:pointer; transition:all .15s; align-self:flex-end; }
    .filter-reset:hover { border-color:var(--red); color:var(--red); }

    /* ── Lead cards ── */
    .lead-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); margin-bottom:8px; overflow:hidden; border-left:3px solid transparent; transition:border-color .2s, box-shadow .2s; }
    .lead-card:hover { box-shadow:0 4px 24px rgba(0,0,0,.4); }
    .lead-card-header { padding:14px 16px; display:flex; justify-content:space-between; align-items:flex-start; gap:12px; cursor:pointer; }
    .lead-title { font-weight:700; font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:4px; }
    .lead-meta-row { display:flex; gap:8px; align-items:center; flex-wrap:wrap; margin-bottom:3px; }
    .lead-meta-chip { font-family:var(--mono); font-size:10px; color:var(--text2); display:flex; align-items:center; gap:3px; }
    .lead-meta-sep { color:var(--text3); }
    .lead-location { font-size:10px; color:var(--text3); font-family:var(--mono); margin-top:2px; display:flex; align-items:center; gap:4px; }
    .lead-score-block { text-align:right; flex-shrink:0; min-width:56px; }
    .lead-score-num { font-family:var(--mono); font-size:26px; font-weight:700; line-height:1; }
    .lead-score-lbl { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:2px; margin-top:2px; }

    .lead-body { display:none; border-top:1px solid var(--border); }
    .lead-body-inner { padding:14px 16px; }
    .lead-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px 16px; margin-bottom:12px; }
    .lead-field-label { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:1.5px; margin-bottom:3px; }
    .lead-field-val { font-size:11px; color:var(--text); font-family:var(--mono); word-break:break-word; }
    .lead-field-val a { color:var(--accent); text-decoration:none; }
    .lead-field-val a:hover { text-decoration:underline; }
    .lead-desc { background:var(--surf2); border:1px solid var(--border); border-radius:var(--r); padding:10px 12px; font-size:10px; color:var(--text2); line-height:1.6; margin-bottom:12px; font-family:var(--mono); max-height:80px; overflow:hidden; position:relative; }
    .lead-desc::after { content:""; position:absolute; bottom:0; left:0; right:0; height:24px; background:linear-gradient(transparent,var(--surf2)); }
    .lead-actions { display:flex; gap:10px; align-items:center; padding-top:10px; border-top:1px solid var(--border); }
    .btn-primary { padding:6px 14px; background:rgba(0,229,160,.12); border:1px solid rgba(0,229,160,.3); border-radius:var(--r); color:var(--accent); font-family:var(--mono); font-size:10px; font-weight:600; cursor:pointer; transition:all .15s; text-decoration:none; display:inline-block; }
    .btn-primary:hover { background:rgba(0,229,160,.2); }
    .btn-ghost { padding:6px 14px; background:transparent; border:1px solid var(--border2); border-radius:var(--r); color:var(--text2); font-family:var(--mono); font-size:10px; cursor:pointer; transition:all .15s; text-decoration:none; display:inline-block; }
    .btn-ghost:hover { border-color:var(--text2); color:var(--text); }

    /* ── Pagination ── */
    .pagination { display:flex; gap:5px; justify-content:center; margin-top:18px; align-items:center; }
    .page-btn { padding:5px 10px; border-radius:var(--r); border:1px solid var(--border2); background:var(--surf2); color:var(--text2); font-family:var(--mono); font-size:10px; cursor:pointer; transition:all .15s; }
    .page-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }
    .page-btn:hover:not(.active) { border-color:var(--border2); color:var(--text); }
    .page-ellipsis { color:var(--text3); font-family:var(--mono); font-size:10px; padding:0 4px; }

    /* ── Location bars ── */
    .loc-row { display:flex; align-items:center; gap:10px; padding:6px 0; }
    .loc-bar-bg { flex:1; height:2px; background:var(--border); border-radius:1px; }
    .loc-bar-fill { height:100%; background:var(--accent); border-radius:1px; opacity:.6; }

    /* ── Segment card ── */
    .seg-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:18px; }
    .seg-card-header { display:flex; align-items:center; gap:10px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    .seg-color-block { width:10px; height:36px; border-radius:3px; flex-shrink:0; }
    .seg-stats-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .seg-stat { background:var(--surf2); border-radius:var(--r); padding:10px 12px; border:1px solid var(--border); }
    .seg-stat-label { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:1.5px; margin-bottom:4px; }
    .seg-stat-val { font-family:var(--mono); font-size:16px; font-weight:700; }

    /* ── Empty state ── */
    .empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
    .empty-state-icon { font-size:32px; margin-bottom:12px; opacity:.4; }
    .empty-state-text { font-family:var(--mono); font-size:11px; }

    /* ── Info tooltip tag ── */
    .info-tag { display:inline-flex; align-items:center; gap:4px; font-family:var(--mono); font-size:9px; color:var(--text3); background:var(--surf2); border:1px solid var(--border); border-radius:4px; padding:2px 6px; }

    /* ── Divider ── */
    .divider { border:none; border-top:1px solid var(--border); margin:16px 0; }

    /* ── Responsive ── */
    @media(max-width:1200px) { .stats-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:900px) { .two-col { grid-template-columns:1fr; } .lead-grid { grid-template-columns:repeat(2,1fr); } }
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-eyebrow"><span class="live-dot"></span> LIVE INTELLIGENCE</div>
      <div class="brand-name">ZAMEEN<br>INTEL</div>
      <div class="brand-sub">Karachi · Real Estate B2B</div>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">OVERVIEW</div>
      <button class="nav-link active" onclick="showPage('dashboard', this)"><span class="nav-icon">◈</span> Dashboard</button>
      <button class="nav-link" onclick="showPage('analytics', this)"><span class="nav-icon">◉</span> Analytics</button>
    </div>

    <div class="nav-section">
      <div class="nav-section-label">LEADS</div>
      <button class="nav-link" onclick="showPage('leads', this)"><span class="nav-icon">⬡</span> All Leads</button>
      <button class="nav-link" onclick="showPage('segments', this)"><span class="nav-icon">▣</span> Segments</button>
    </div>

    <div class="sidebar-footer">
      <div class="sf-row">Zameen.com · Karachi Flats</div>
      <div class="sf-row">Daily scrape + ML scoring</div>
      <div id="sb-stats">
        <div class="sf-stat"><span class="sf-stat-label">TOTAL LEADS</span><span class="sf-stat-val" id="sb-total">—</span></div>
        <div class="sf-stat"><span class="sf-stat-label">TODAY</span><span class="sf-stat-val" id="sb-today">—</span></div>
      </div>
    </div>
  </aside>

  <main class="main" id="main-content"></main>
</div>

<script>
// ── Config ──────────────────────────────────────────────────
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://b2b-lead-intelligence-platform-1.onrender.com';

const SEGMENT_COLORS = {
  "Budget Area":    "#2d9cff",
  "Mid-Value Area": "#00e5a0",
  "Premium Area":   "#f5c518",
  "Luxury Area":    "#ff6b35"
};

const SEGMENT_DESC = {
  "Budget Area":    "Entry-level flats · High volume · First-time buyers",
  "Mid-Value Area": "Mid-range inventory · Strong demand · Growing areas",
  "Premium Area":   "Quality listings · DHA/Clifton · High-intent buyers",
  "Luxury Area":    "Ultra-premium · Low inventory · HNW clientele"
};

// ── Utilities ───────────────────────────────────────────────
function fmt(n) {
  if (n == null || n === "" || isNaN(n)) return "–";
  n = Number(n);
  if (n >= 10_000_000) return (n/10_000_000).toFixed(1) + " Cr";
  if (n >= 100_000)    return (n/100_000).toFixed(1)    + " L";
  return n.toLocaleString();
}

function fmtPsf(n) {
  if (!n || isNaN(n)) return "–";
  return "₨" + Number(n).toLocaleString(undefined, {maximumFractionDigits:0}) + "/sqft";
}

function fmtArea(n) {
  if (!n || isNaN(n)) return "–";
  return Number(n).toLocaleString(undefined, {maximumFractionDigits:0}) + " sqft";
}

function fmtNum(n, dec=1) {
  if (n == null || isNaN(n)) return "–";
  return Number(n).toFixed(dec);
}

function scoreColor(s) {
  return s >= 70 ? "var(--accent)" : s >= 40 ? "var(--yellow)" : "var(--red)";
}

function scoreLabel(s) {
  return s >= 70 ? "HIGH" : s >= 40 ? "MED" : "LOW";
}

function sanitize(str) {
  if (!str) return "–";
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

async function get(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    return r.json();
  } catch(e) {
    console.error('API error:', path, e);
    return {};
  }
}

// ── State ────────────────────────────────────────────────────
let state = {
  page: "dashboard",
  leadsFilters: {
    page: 1, limit: 20,
    sort_by: "lead_score",
    segment: "", min_score: "",
    location: "", bedrooms: "",
    min_price: "", max_price: ""
  }
};

function showPage(name, btn) {
  state.page = name;
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

// ── Sidebar stats ────────────────────────────────────────────
async function loadSidebarStats() {
  const s = await get('/api/summary');
  const t = document.getElementById('sb-total');
  const d = document.getElementById('sb-today');
  if (t) t.textContent = (s.total_leads ?? "–").toLocaleString?.() || s.total_leads || "–";
  if (d) d.textContent = s.today_leads ?? "–";
}

// ── Dashboard ────────────────────────────────────────────────
async function renderDashboard() {
  const el = document.getElementById('main-content');
  const now = new Date().toLocaleString('en-US',{dateStyle:'medium',timeStyle:'short'});
  el.innerHTML = `
    <div class="page-header-row">
      <div>
        <div class="page-eyebrow">KARACHI REAL ESTATE · LIVE INTELLIGENCE</div>
        <div class="page-title">Lead Dashboard</div>
        <div class="page-sub">Automated scraping · ML scoring · Market segmentation</div>
      </div>
      <div class="page-header-meta">
        Last refresh<br>${now}<br>
        <span style="color:var(--accent);font-size:8px">● DATA LIVE</span>
      </div>
    </div>

    <div class="stats-grid" id="stats-grid">
      ${[...Array(6)].map(()=>`<div class="stat-card"><div class="skel" style="height:10px;width:70px;margin-bottom:10px"></div><div class="skel" style="height:30px;width:90px"></div></div>`).join('')}
    </div>

    <div class="two-col" style="margin-bottom:16px">
      <div class="panel">
        <div class="panel-eyebrow">WEEKLY TREND</div>
        <div class="panel-title">Daily Lead Volume</div>
        <div id="trend-chart" style="height:170px" class="skel"></div>
      </div>
      <div class="panel">
        <div class="panel-eyebrow">MARKET SPLIT</div>
        <div class="panel-title">Segment Distribution</div>
        <div id="seg-chart"><div class="skel" style="height:150px"></div></div>
      </div>
    </div>

    <div class="table-wrap">
      <div class="table-head">
        <div>
          <div class="panel-eyebrow">TOP RANKED</div>
          <div style="font-weight:700;font-size:13px">Highest-Scored Leads</div>
        </div>
        <button class="btn-ghost" style="font-size:10px" onclick="showPage('leads',document.querySelectorAll('.nav-link')[3])">View all leads →</button>
      </div>
      <div id="top-table">
        <table><thead><tr>
          <th>PROPERTY</th><th>PRICE</th><th>AREA</th><th>BEDS / BATHS</th><th>₨/SQFT</th><th>SEGMENT</th><th>SCORE</th><th>POSTED</th><th>LINK</th>
        </tr></thead><tbody>
          ${[...Array(8)].map(()=>`<tr>${[...Array(9)].map(()=>`<td><div class="skel" style="height:12px;width:88%"></div></td>`).join('')}</tr>`).join('')}
        </tbody></table>
      </div>
    </div>`;

  const [summary, trends, top] = await Promise.all([
    get('/api/summary'),
    get('/api/trends/weekly'),
    get('/api/leads/top?limit=10')
  ]);

  // ── Stats cards
  const segsObj = summary.segments || {};
  const segTotal = Object.values(segsObj).reduce((a,v)=>a+v,0);
  const luxCount = segsObj["Luxury Area"] || 0;
  const premCount = segsObj["Premium Area"] || 0;

  const cards = [
    { label:"TOTAL LEADS",       value: (summary.total_leads ?? "–").toLocaleString?.() || summary.total_leads || "–", unit:"", color:"var(--accent)", delta:"All-time scraped" },
    { label:"TODAY'S LISTINGS",  value: summary.today_leads ?? "–",   unit:"",    color:"var(--blue)",   delta:"Scraped today" },
    { label:"AVG LEAD SCORE",    value: fmtNum(summary.avg_lead_score,1), unit:"/100", color:"var(--yellow)", delta:"ML-computed quality" },
    { label:"AVG PRICE",         value: fmt(summary.avg_price),        unit:"",    color:"var(--orange)", delta:"Across all segments" },
    { label:"AVG ₨/SQFT",        value: fmtPsf(summary.avg_price_per_sqft || null), unit:"", color:"var(--purple)", delta:"Price density" },
    { label:"VERIFIED AGENCIES", value: summary.verified_agencies ?? "–", unit:"", color:"#22c55e",      delta:"Zameen verified" },
  ];

  document.getElementById('stats-grid').innerHTML = cards.map((c,i) => `
    <div class="stat-card fade stagger-${Math.min(i+1,3)}">
      <div class="stat-accent-bar" style="background:${c.color};opacity:.75"></div>
      <div class="stat-label">${c.label}</div>
      <div class="stat-value" style="color:${c.color}">${c.value}<span class="stat-unit">${c.unit}</span></div>
      <div class="stat-delta">${c.delta}</div>
    </div>`).join('');

  // ── Trend chart
  const days = trends.days || [], counts = trends.counts || [];
  if (days.length) {
    const maxC = Math.max(...counts, 1);
    const W=500, H=155, PAD=28;
    const bw = (W - PAD*2) / days.length;
    const bars = days.map((d,i) => {
      const bh = Math.max((counts[i]/maxC)*(H-45), 2);
      const x = PAD + i*bw + bw*0.12;
      const y = H - bh - 22;
      const isMax = counts[i] === Math.max(...counts);
      return `<rect x="${x}" y="${y}" width="${bw*0.76}" height="${bh}" rx="2" fill="var(--accent)" opacity="${isMax?'0.9':'0.55'}"/>
              <text x="${x+bw*0.38}" y="${H-5}" text-anchor="middle" font-size="8" fill="var(--text3)" font-family="JetBrains Mono">${d.slice(5)}</text>
              <text x="${x+bw*0.38}" y="${y-5}" text-anchor="middle" font-size="8" fill="${isMax?'var(--accent)':'var(--text2)'}" font-family="JetBrains Mono">${counts[i]}</text>`;
    }).join('');
    document.getElementById('trend-chart').className = 'fade';
    document.getElementById('trend-chart').innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">${bars}</svg>`;
  }

  // ── Segment donut
  const segs = Object.entries(segsObj);
  const total = segs.reduce((a,[,v])=>a+v,0)||1;
  let cum = 0;
  const R=52, cx=72, cy=72;
  const paths = segs.map(([name,val]) => {
    const pct = val/total;
    const start = cum * 2*Math.PI - Math.PI/2;
    cum += pct;
    const end = cum * 2*Math.PI - Math.PI/2;
    const x1=cx+R*Math.cos(start), y1=cy+R*Math.sin(start);
    const x2=cx+R*Math.cos(end),   y2=cy+R*Math.sin(end);
    const large = pct > 0.5 ? 1 : 0;
    const color = SEGMENT_COLORS[name]||"#888";
    return `<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${large},1 ${x2},${y2} Z" fill="${color}" opacity="0.85"/>`;
  }).join('');
  const legend = segs.map(([name,val])=>`
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
      <div style="width:7px;height:7px;border-radius:2px;background:${SEGMENT_COLORS[name]||'#888'};flex-shrink:0"></div>
      <span style="font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text)">${val}</span>
      <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${((val/total)*100).toFixed(0)}%</span>
    </div>`).join('');
  document.getElementById('seg-chart').innerHTML = `
    <div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <svg viewBox="0 0 144 144" style="width:130px;height:130px;flex-shrink:0">
        ${paths}
        <circle cx="${cx}" cy="${cy}" r="26" fill="var(--surf)"/>
        <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="11" fill="var(--text2)" font-family="JetBrains Mono">${total}</text>
      </svg>
      <div style="flex:1;min-width:140px">${legend}</div>
    </div>`;

  // ── Top leads table
  const tbl = (top.length ? top : (top.leads || []));
  document.getElementById('top-table').innerHTML = `<table><thead><tr>
    <th>PROPERTY</th><th>PRICE</th><th>AREA</th><th>BEDS/BATHS</th><th>₨/SQFT</th><th>SEGMENT</th><th>SCORE</th><th>POSTED</th><th>LINK</th>
  </tr></thead><tbody>
    ${tbl.map(l=>{
      const s=Math.round(l.lead_score||0), c=scoreColor(s), sc=SEGMENT_COLORS[l.market_segment]||"var(--text2)";
      const beds = l.bedrooms ? String(l.bedrooms).replace(/[^0-9]/g,'') : '–';
      const baths = l.bathrooms ? String(l.bathrooms).replace(/[^0-9]/g,'') : '–';
      const psf = l.price_per_sqft ? Number(l.price_per_sqft).toLocaleString(undefined,{maximumFractionDigits:0}) : '–';
      return `<tr>
        <td>
          <div style="font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px" title="${sanitize(l.title)}">${sanitize(l.title)||"—"}</div>
          <div style="font-size:9px;color:var(--text3);font-family:var(--mono);margin-top:2px">${sanitize(l.location)||""}</div>
        </td>
        <td style="font-family:var(--mono);color:var(--blue);font-size:11px;white-space:nowrap">${fmt(l.price)}</td>
        <td style="font-family:var(--mono);font-size:10px;color:var(--text2)">${fmtArea(l.area_sqft)}</td>
        <td style="font-family:var(--mono);font-size:10px;color:var(--text2);white-space:nowrap">${beds}🛏 / ${baths}🚿</td>
        <td style="font-family:var(--mono);font-size:10px;color:var(--purple)">₨${psf}</td>
        <td><span class="badge" style="background:${sc}18;color:${sc};border:1px solid ${sc}30">${l.market_segment||"—"}</span></td>
        <td>
          <div class="score-bar-wrap">
            <div class="score-bar-bg"><div class="score-bar-fill" style="width:${s}%;background:${c}"></div></div>
            <span style="font-family:var(--mono);font-size:10px;color:${c};min-width:20px">${s}</span>
          </div>
        </td>
        <td style="font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap">${sanitize(l.posted_date)||"—"}</td>
        <td>${l.link ? `<a href="${l.link}" target="_blank" rel="noopener" class="btn-primary" style="font-size:9px;padding:3px 8px;white-space:nowrap">↗ View</a>` : '<span style="color:var(--text3)">—</span>'}</td>
      </tr>`;
    }).join('')}
  </tbody></table>`;
}

// ── Leads ─────────────────────────────────────────────────────

  const f = state.leadsFilters;

  el.innerHTML = `

        <select onchange="filterLeads('sort_by',this.value)" style="width:130px">

      <button class="filter-reset" onclick="resetFilters()">✕ Reset</button>

    <div id="leads-list">

    </div>
    <div class="pagination" id="leads-pagination"></div>`;

  const params = new URLSearchParams(
    Object.fromEntries(Object.entries(f).filter(([,v])=>v!==""))
  ).toString();
  const data = await get(`/api/leads?${params}`);

  const total = data.total ?? 0;

  } else {

      const beds  = l.bedrooms  ? String(l.bedrooms).replace(/[^0-9]/g,'')  : '–';
      const baths = l.bathrooms ? String(l.bathrooms).replace(/[^0-9]/g,'') : '–';
      const psf   = l.price_per_sqft ? Number(l.price_per_sqft).toLocaleString(undefined,{maximumFractionDigits:0}) : '–';
      const isVerified = String(l.verified_agency||'').toLowerCase() === 'verified';

      // All columns from zameen_karachi_flats CSV + zameen_market_segments CSV

        ["LOCATION",             sanitize(l.location)],

        ["AREA (SQFT)",          fmtArea(l.area_sqft)],
        ["BEDROOMS",             l.bedrooms  ? sanitize(String(l.bedrooms))  : "–"],
        ["BATHROOMS",            l.bathrooms ? sanitize(String(l.bathrooms)) : "–"],
        ["BED/BATH RATIO",       fmtNum(l.bed_bath_ratio, 2)],

        ["TOTAL AGENT LISTINGS", l.total_agent_listings != null ? String(l.total_agent_listings) : "–"],

        ["PHONE",                l.phone_number ? `<a href="tel:${sanitize(l.phone_number)}">${sanitize(l.phone_number)}</a>` : "–"],
        ["EMAIL",                l.email ? `<a href="mailto:${sanitize(l.email)}">${sanitize(l.email)}</a>` : "–"],
        // ── Links
        ["LISTING URL",          l.link ? `<a href="${l.link}" target="_blank" rel="noopener">zameen.com →</a>` : "–"],

          <div style="flex:1;min-width:0">
            <div class="lead-title" title="${sanitize(l.title)}">${sanitize(l.title)||"Untitled"}</div>

              <span class="lead-meta-chip">${beds} 🛏 ${baths} 🚿</span>
              <span class="lead-meta-sep">·</span>
              <span class="lead-meta-chip" style="color:var(--purple)">₨${psf}/sqft</span>
              <span class="badge" style="background:${sc}18;color:${sc};border:1px solid ${sc}30">${l.market_segment||"—"}</span>
              ${isVerified ? `<span class="badge" style="background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.3)">✓ Verified</span>` : ''}
            </div>

              ${l.agency_url  ? `<a href="${l.agency_url}" target="_blank" rel="noopener" class="btn-ghost">Agency Profile</a>` : ''}
              ${l.phone_number? `<a href="tel:${l.phone_number}" class="btn-ghost">📞 ${sanitize(l.phone_number)}</a>` : ''}
              ${l.email       ? `<a href="mailto:${l.email}" class="btn-ghost">✉ Email Agent</a>` : ''}
            </div>
          </div>
        </div>
      </div>`;
    }).join('');
  }

  // Pagination
  const totalPages = Math.min(data.pages || 1, 10);
  let paginationHTML = '';
  for (let p = 1; p <= totalPages; p++) {
    if (p === 1 || p === totalPages || Math.abs(p - page) <= 2) {
      paginationHTML += `<button class="page-btn ${p===page?"active":""}" onclick="goPage(${p})">${p}</button>`;
    } else if (Math.abs(p - page) === 3) {
      paginationHTML += `<span class="page-ellipsis">…</span>`;
    }
  }
  document.getElementById('leads-pagination').innerHTML = paginationHTML;
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const isOpen = body.style.display === "block";
  body.style.display = isOpen ? "none" : "block";
}

function filterLeads(key, val) {
  state.leadsFilters[key] = val;
  state.leadsFilters.page = 1;
  renderLeads();
}

function goPage(p) {
  state.leadsFilters.page = p;
  renderLeads();
  window.scrollTo({top:0, behavior:'smooth'});
}

function resetFilters() {
  state.leadsFilters = { page:1, limit:20, sort_by:"lead_score", segment:"", min_score:"", location:"", bedrooms:"", min_price:"", max_price:"" };
  renderLeads();
}

// ── Analytics ─────────────────────────────────────────────────
async function renderAnalytics() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-eyebrow">MARKET INTELLIGENCE</div>
    <div class="page-title">Analytics</div>
    <div class="page-sub">Segment performance · Pricing density · Geo distribution</div>

    <div class="three-col">
      <div class="panel"><div class="panel-eyebrow">PRICING</div><div class="panel-title">Avg Price by Segment</div><div id="price-chart" style="height:170px" class="skel"></div></div>
      <div class="panel"><div class="panel-eyebrow">QUALITY SCORE</div><div class="panel-title">Avg Lead Score by Segment</div><div id="score-chart" style="height:170px" class="skel"></div></div>
      <div class="panel"><div class="panel-eyebrow">PRICE DENSITY</div><div class="panel-title">Avg ₨/Sqft by Segment</div><div id="psf-chart" style="height:170px" class="skel"></div></div>
    </div>

    <div class="two-col">
      <div class="panel">
        <div class="panel-eyebrow">GEO ANALYSIS</div>
        <div class="panel-title">Top Locations by Volume</div>
        <div id="loc-list"><div class="skel" style="height:200px"></div></div>
      </div>
      <div class="panel">
        <div class="panel-eyebrow">SEGMENT BREAKDOWN</div>
        <div class="panel-title">Listing Count Distribution</div>
        <div id="count-chart" style="height:170px" class="skel"></div>
      </div>
    </div>`;

  const [segs, locs] = await Promise.all([
    get('/api/trends/segments'),
    get('/api/trends/locations')
  ]);

  function barChart(containerId, data, key, formatFn, colorFn, label) {
    if (!data || !data.length) return;
    const max = Math.max(...data.map(d=>+(d[key]||0)), 1);
    const W=320, H=155, PAD=28;
    const bw = (W - PAD*2) / data.length;
    const bars = data.map((d,i) => {
      const val = +(d[key]||0);
      const bh = Math.max((val/max)*(H-48), 2);
      const x = PAD + i*bw + bw*0.1;
      const y = H - bh - 24;
      const c = colorFn(d);
      const lbl = (d.market_segment||"").replace(" Area","");
      return `<rect x="${x}" y="${y}" width="${bw*0.8}" height="${bh}" rx="2" fill="${c}" opacity="0.8"/>
              <text x="${x+bw*0.4}" y="${H-5}" text-anchor="middle" font-size="8" fill="var(--text3)" font-family="JetBrains Mono">${lbl}</text>
              <text x="${x+bw*0.4}" y="${y-5}" text-anchor="middle" font-size="8" fill="${c}" font-family="JetBrains Mono">${formatFn(val)}</text>`;
    }).join('');
    const el = document.getElementById(containerId);
    el.className = 'fade';
    el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">${bars}</svg>`;
  }

  barChart('price-chart', segs, 'avg_price', v => fmt(v), d=>SEGMENT_COLORS[d.market_segment]||"var(--accent)");
  barChart('score-chart', segs, 'avg_score', v => Math.round(v||0), d=>SEGMENT_COLORS[d.market_segment]||"var(--accent)");
  barChart('psf-chart',   segs, 'avg_price_per_sqft', v => v ? Number(v).toLocaleString(undefined,{maximumFractionDigits:0}) : '–', d=>SEGMENT_COLORS[d.market_segment]||"var(--accent)");
  barChart('count-chart', segs, 'count', v => v, d=>SEGMENT_COLORS[d.market_segment]||"var(--accent)");

  // Locations
  const locsArr = Array.isArray(locs) ? locs : (locs.locations || []);
  const maxLoc = locsArr[0]?.count || 1;
  document.getElementById('loc-list').innerHTML = locsArr.length ? `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0 20px">
      ${locsArr.slice(0,18).map((l,i)=>`
        <div class="loc-row">
          <span style="font-family:var(--mono);font-size:8px;color:var(--text3);min-width:16px;text-align:right">${i+1}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px">${sanitize(l.location)||"Unknown"}</span>
              <span style="font-family:var(--mono);font-size:9px;color:var(--accent);margin-left:6px">${l.count}</span>
            </div>
            <div class="loc-bar-bg"><div class="loc-bar-fill" style="width:${(l.count/maxLoc*100).toFixed(0)}%"></div></div>
          </div>
        </div>`).join('')}
    </div>` : `<div class="empty-state"><div class="empty-state-text">No location data available</div></div>`;
}

// ── Segments ─────────────────────────────────────────────────
async function renderSegments() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div class="page-eyebrow">MARKET SEGMENTATION</div>
    <div class="page-title">Segment Intelligence</div>
    <div class="page-sub">ML-clustered market segments · Pricing bands · Opportunity scoring</div>
    <div id="seg-cards" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
      ${[...Array(4)].map(()=>`<div class="skel" style="height:200px;border-radius:var(--rl)"></div>`).join('')}
    </div>
    <div class="table-wrap">
      <div class="table-head">
        <div><div class="panel-eyebrow">COMPARATIVE</div><div style="font-weight:700;font-size:13px">Segment Comparison Table</div></div>
      </div>
      <div id="seg-table"><div class="skel" style="height:120px;margin:16px"></div></div>
    </div>`;

  const segs = await get('/api/trends/segments');
  const segsArr = Array.isArray(segs) ? segs : [];

  if (segsArr.length) {
    document.getElementById('seg-cards').innerHTML = segsArr.map(seg => {
      const sc = SEGMENT_COLORS[seg.market_segment] || "var(--text2)";
      const desc = SEGMENT_DESC[seg.market_segment] || "";
      return `<div class="seg-card fade" style="border-top:2px solid ${sc}">
        <div class="seg-card-header">
          <div class="seg-color-block" style="background:${sc}"></div>
          <div>
            <div style="font-weight:800;font-size:14px">${seg.market_segment||"Unknown"}</div>
            <div style="font-size:10px;color:var(--text2);font-family:var(--mono);margin-top:2px">${desc}</div>
          </div>
        </div>
        <div class="seg-stats-grid">
          <div class="seg-stat">
            <div class="seg-stat-label">LISTINGS</div>
            <div class="seg-stat-val" style="color:${sc}">${(seg.count||"–").toLocaleString?.() || seg.count}</div>
          </div>
          <div class="seg-stat">
            <div class="seg-stat-label">AVG SCORE</div>
            <div class="seg-stat-val" style="color:${scoreColor(seg.avg_score||0)}">${fmtNum(seg.avg_score,1)}</div>
          </div>
          <div class="seg-stat">
            <div class="seg-stat-label">AVG PRICE</div>
            <div class="seg-stat-val" style="color:var(--blue);font-size:13px">${fmt(seg.avg_price)}</div>
          </div>
          <div class="seg-stat">
            <div class="seg-stat-label">AVG ₨/SQFT</div>
            <div class="seg-stat-val" style="color:var(--purple);font-size:13px">${fmtPsf(seg.avg_price_per_sqft)}</div>
          </div>
          <div class="seg-stat">
            <div class="seg-stat-label">AVG AREA</div>
            <div class="seg-stat-val" style="font-size:13px">${fmtArea(seg.avg_area_sqft)}</div>
          </div>
          <div class="seg-stat">
            <div class="seg-stat-label">AVG BEDS</div>
            <div class="seg-stat-val" style="font-size:13px">${fmtNum(seg.avg_bedrooms,1)}</div>
          </div>
        </div>
      </div>`;
    }).join('');

    document.getElementById('seg-table').innerHTML = `<table><thead><tr>
      <th>SEGMENT</th><th>LISTINGS</th><th>AVG PRICE</th><th>AVG ₨/SQFT</th><th>AVG AREA</th><th>AVG BEDS</th><th>AVG BATHS</th><th>AVG SCORE</th><th>CLUSTER</th>
    </tr></thead><tbody>
      ${segsArr.map(seg => {
        const sc = SEGMENT_COLORS[seg.market_segment] || "var(--text2)";
        return `<tr>
          <td><span class="badge" style="background:${sc}18;color:${sc};border:1px solid ${sc}30">${seg.market_segment||"–"}</span></td>
          <td style="font-family:var(--mono)">${(seg.count||"–").toLocaleString?.() || seg.count}</td>
          <td style="font-family:var(--mono);color:var(--blue)">${fmt(seg.avg_price)}</td>
          <td style="font-family:var(--mono);color:var(--purple)">${fmtPsf(seg.avg_price_per_sqft)}</td>
          <td style="font-family:var(--mono)">${fmtArea(seg.avg_area_sqft)}</td>
          <td style="font-family:var(--mono)">${fmtNum(seg.avg_bedrooms,1)}</td>
          <td style="font-family:var(--mono)">${fmtNum(seg.avg_bathrooms,1)}</td>
          <td>
            <div class="score-bar-wrap">
              <div class="score-bar-bg"><div class="score-bar-fill" style="width:${Math.round(seg.avg_score||0)}%;background:${scoreColor(seg.avg_score||0)}"></div></div>
              <span style="font-family:var(--mono);font-size:10px;color:${scoreColor(seg.avg_score||0)}">${fmtNum(seg.avg_score,1)}</span>
            </div>
          </td>
          <td style="font-family:var(--mono);color:var(--text3)">${seg.cluster ?? "–"}</td>
        </tr>`;
      }).join('')}
    </tbody></table>`;
  } else {
    document.getElementById('seg-cards').innerHTML = `<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-state-icon">▣</div><div class="empty-state-text">Segment data not yet available</div></div></div>`;
    document.getElementById('seg-table').innerHTML = '';
  }
}

// ── Router ────────────────────────────────────────────────────
function render() {
  document.getElementById('main-content').innerHTML = '';
  if      (state.page === 'dashboard') renderDashboard();
  else if (state.page === 'leads')     renderLeads();
  else if (state.page === 'analytics') renderAnalytics();
  else if (state.page === 'segments')  renderSegments();
}

loadSidebarStats();
render();
</script>
</body>
</html>
