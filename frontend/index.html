<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zameen Intel · B2B Lead Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #080c10;
      --surf:    #0d1520;
      --surf2:   #111d2c;
      --surf3:   #162438;
      --border:  #1a2d42;
      --border2: #213a56;
      --accent:  #00d4ff;
      --accent2: #0099bb;
      --green:   #00e5a0;
      --orange:  #ff7c3c;
      --yellow:  #ffc63d;
      --red:     #ff4d6a;
      --purple:  #b06eff;
      --text:    #e4eef8;
      --text2:   #607b96;
      --text3:   #2d4258;
      --mono:    "Space Mono", monospace;
      --sans:    "Outfit", sans-serif;
      --r:       6px;
      --rl:      10px;
      --sidebar: 240px;
    }
    html, body { background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 13px; line-height: 1.55; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: var(--surf); }
    ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent2); }
    body::before { content:""; position:fixed; inset:0; background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,212,255,.005) 2px,rgba(0,212,255,.005) 4px); pointer-events:none; z-index:9999; }

    @keyframes fadeUp  { from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);} }
    @keyframes pulse   { 0%,100%{opacity:1;}50%{opacity:.2;} }
    @keyframes shimmer { from{background-position:-800px 0}to{background-position:800px 0} }

    .skel { background:linear-gradient(90deg,var(--surf) 25%,var(--surf2) 50%,var(--surf) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:var(--r); }
    .fade { animation:fadeUp .35s ease both; }
    .d1{animation-delay:.04s} .d2{animation-delay:.08s} .d3{animation-delay:.12s}
    .d4{animation-delay:.16s} .d5{animation-delay:.20s} .d6{animation-delay:.24s}

    /* ── Layout ── */
    #app { display:flex; min-height:100vh; }
    .sidebar { width:var(--sidebar); min-width:var(--sidebar); background:var(--surf); border-right:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; height:100vh; overflow-y:auto; }
    .main { flex:1; min-width:0; padding:28px 34px 56px; }

    /* ── Sidebar ── */
    .brand { padding:24px 20px 20px; border-bottom:1px solid var(--border); }
    .brand-eyebrow { font-family:var(--mono); font-size:8px; color:var(--accent); letter-spacing:3px; margin-bottom:10px; display:flex; align-items:center; gap:7px; }
    .live-dot { display:inline-block; width:6px; height:6px; background:var(--accent); border-radius:50%; animation:pulse 2.2s infinite; box-shadow:0 0 6px var(--accent); }
    .brand-logo { font-family:var(--sans); font-size:22px; font-weight:800; letter-spacing:-1px; line-height:1; margin-bottom:4px; }
    .brand-logo span { color:var(--accent); }
    .brand-sub { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:1px; }
    .nav-section { padding:16px 12px 4px; }
    .nav-label { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:3px; padding:0 8px; margin-bottom:4px; }
    .nav-link { display:flex; align-items:center; gap:10px; padding:9px 10px; border-radius:var(--r); color:var(--text2); text-decoration:none; font-size:13px; font-weight:500; cursor:pointer; border:none; background:none; width:100%; text-align:left; transition:all .15s; border-left:2px solid transparent; }
    .nav-link:hover { color:var(--text); background:rgba(255,255,255,.03); }
    .nav-link.active { color:var(--accent); background:rgba(0,212,255,.06); border-left-color:var(--accent); }
    .nav-icon { font-size:14px; width:18px; text-align:center; flex-shrink:0; }
    .sidebar-footer { margin-top:auto; padding:14px 18px; border-top:1px solid var(--border); background:rgba(0,0,0,.15); }
    .sf-line { font-family:var(--mono); font-size:8px; color:var(--text3); line-height:1.8; }
    .sf-kv { display:flex; justify-content:space-between; margin-top:7px; }
    .sf-k { font-family:var(--mono); font-size:8px; color:var(--text3); }
    .sf-v { font-family:var(--mono); font-size:10px; color:var(--accent); font-weight:700; }

    /* ── Page ── */
    .pg-eyebrow { font-family:var(--mono); font-size:8px; color:var(--accent); letter-spacing:4px; margin-bottom:5px; }
    .pg-title { font-size:26px; font-weight:800; letter-spacing:-.5px; margin-bottom:2px; }
    .pg-sub { color:var(--text2); font-size:12px; margin-bottom:26px; }
    .pg-hdr { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:26px; }
    .pg-hdr-meta { text-align:right; font-family:var(--mono); font-size:9px; color:var(--text3); line-height:1.9; }

    /* ── KPI Grid ── */
    .kpi-grid { display:grid; grid-template-columns:repeat(6,1fr); gap:12px; margin-bottom:22px; }
    .kpi-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:18px 18px 14px; position:relative; overflow:hidden; transition:border-color .2s, transform .2s; }
    .kpi-card:hover { border-color:var(--border2); transform:translateY(-1px); }
    .kpi-bar { position:absolute; top:0; left:0; right:0; height:2px; }
    .kpi-label { font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:2px; margin-bottom:10px; }
    .kpi-val { font-size:26px; font-weight:800; line-height:1; letter-spacing:-1px; }
    .kpi-unit { font-size:11px; color:var(--text2); margin-left:2px; font-weight:400; letter-spacing:0; }
    .kpi-note { font-family:var(--mono); font-size:8px; color:var(--text3); margin-top:7px; }

    /* ── Panel ── */
    .panel { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:20px; }
    .panel-eyebrow { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:2px; margin-bottom:2px; }
    .panel-title { font-weight:700; font-size:13px; margin-bottom:14px; }
    .g2  { display:grid; grid-template-columns:1fr 280px; gap:14px; margin-bottom:14px; }
    .g2eq{ display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:14px; }
    .g3  { display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px; margin-bottom:14px; }
    .g4  { display:grid; grid-template-columns:1fr 1fr 1fr 1fr; gap:14px; margin-bottom:14px; }

    /* ── Table ── */
    .tbl-wrap { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); overflow:hidden; margin-bottom:14px; }
    .tbl-hdr { padding:14px 18px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--surf2); }
    table { width:100%; border-collapse:collapse; }
    thead tr { background:var(--surf2); }
    th { padding:8px 14px; text-align:left; font-family:var(--mono); font-size:8px; color:var(--text3); letter-spacing:2px; font-weight:500; white-space:nowrap; }
    td { padding:10px 14px; border-bottom:1px solid var(--border); font-size:12px; vertical-align:middle; }
    tbody tr:last-child td { border-bottom:none; }
    tbody tr:hover td { background:rgba(0,212,255,.02); }

    /* ── Score bar ── */
    .score-bar-wrap { display:flex; align-items:center; gap:7px; }
    .score-bar-bg { flex:1; height:3px; background:var(--border2); border-radius:2px; overflow:hidden; min-width:50px; }
    .score-bar-fill { height:100%; border-radius:2px; }

    /* ── Badge ── */
    .badge { display:inline-flex; align-items:center; border-radius:4px; padding:2px 7px; font-size:9px; font-weight:700; font-family:var(--mono); white-space:nowrap; }
    .badge-verified { background:rgba(0,229,160,.12); color:var(--green); border:1px solid rgba(0,229,160,.3); }

    /* ── Filter bar ── */
    .filter-bar { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:16px 18px; margin-bottom:14px; display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .fg label { display:block; font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:2px; margin-bottom:5px; }
    select, input[type=text], input[type=number] { background:var(--surf2); border:1px solid var(--border2); border-radius:var(--r); padding:7px 10px; color:var(--text); font-family:var(--mono); font-size:11px; outline:none; transition:border-color .15s, box-shadow .15s; }
    select:focus, input:focus { border-color:rgba(0,212,255,.45); box-shadow:0 0 0 2px rgba(0,212,255,.07); }
    .btn-reset { background:transparent; border:1px solid var(--border2); border-radius:var(--r); padding:7px 13px; color:var(--text3); font-family:var(--mono); font-size:9px; cursor:pointer; transition:all .15s; align-self:flex-end; }
    .btn-reset:hover { border-color:var(--red); color:var(--red); }
    .filter-count { font-family:var(--mono); font-size:10px; color:var(--text2); align-self:flex-end; padding-bottom:7px; margin-left:auto; }

    /* ── Lead card ── */
    .lead-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); margin-bottom:8px; overflow:hidden; border-left:3px solid transparent; transition:border-color .2s, box-shadow .2s; }
    .lead-card:hover { box-shadow:0 6px 28px rgba(0,0,0,.5); }
    .lead-hdr { padding:14px 18px; display:flex; justify-content:space-between; align-items:flex-start; gap:14px; cursor:pointer; user-select:none; }
    .lead-title { font-weight:700; font-size:13px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:5px; max-width:500px; }
    .lead-chips { display:flex; gap:7px; align-items:center; flex-wrap:wrap; margin-bottom:4px; }
    .chip { font-family:var(--mono); font-size:10px; color:var(--text2); }
    .chip-sep { color:var(--text3); }
    .lead-loc { font-size:11px; color:var(--text3); font-family:var(--mono); margin-top:2px; display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
    .lead-right { display:flex; flex-direction:column; align-items:flex-end; gap:6px; flex-shrink:0; }
    .score-big { text-align:right; }
    .score-big-num { font-family:var(--mono); font-size:28px; font-weight:700; line-height:1; }
    .score-big-lbl { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:2px; margin-top:2px; }
    .expand-icon { font-family:var(--mono); font-size:10px; color:var(--text3); margin-top:4px; }

    .lead-body { display:none; border-top:1px solid var(--border); }
    .lead-body-inner { padding:16px 18px; }

    /* ── Detail sections ── */
    .ld-section { margin-bottom:16px; }
    .ld-section-title { font-family:var(--mono); font-size:7px; color:var(--accent); letter-spacing:3px; padding-bottom:8px; border-bottom:1px solid var(--border); margin-bottom:12px; }
    .ld-grid  { display:grid; grid-template-columns:repeat(4,1fr); gap:10px 16px; }
    .ld-grid3 { display:grid; grid-template-columns:repeat(3,1fr); gap:10px 16px; }
    .ld-grid2 { display:grid; grid-template-columns:repeat(2,1fr); gap:10px 16px; }
    .lf-label { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:1.5px; margin-bottom:4px; }
    .lf-val   { font-size:12px; color:var(--text); word-break:break-word; }
    .lf-val a { color:var(--accent); text-decoration:none; }
    .lf-val a:hover { text-decoration:underline; }
    .lf-val.mono { font-family:var(--mono); }

    .lead-desc { background:var(--surf2); border:1px solid var(--border); border-left:2px solid var(--border2); border-radius:var(--r); padding:12px 14px; font-size:11px; color:var(--text2); line-height:1.7; margin-bottom:14px; max-height:90px; overflow:hidden; position:relative; }
    .lead-desc::after { content:""; position:absolute; bottom:0; left:0; right:0; height:28px; background:linear-gradient(transparent,var(--surf2)); }

    /* ── Action row ── */
    .lead-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; padding-top:12px; border-top:1px solid var(--border); margin-top:4px; }
    .cta-label { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:2px; margin-right:4px; }
    .btn { display:inline-flex; align-items:center; gap:5px; border-radius:var(--r); font-family:var(--mono); font-size:10px; font-weight:700; cursor:pointer; text-decoration:none; transition:all .15s; white-space:nowrap; padding:7px 13px; border:1px solid transparent; }
    .btn-accent { background:rgba(0,212,255,.1); border-color:rgba(0,212,255,.3); color:var(--accent); }
    .btn-accent:hover { background:rgba(0,212,255,.18); }
    .btn-green  { background:rgba(0,229,160,.1); border-color:rgba(0,229,160,.3); color:var(--green); }
    .btn-green:hover  { background:rgba(0,229,160,.18); }
    .btn-ghost  { background:transparent; border-color:var(--border2); color:var(--text2); }
    .btn-ghost:hover  { border-color:var(--text2); color:var(--text); }

    /* ── Pagination ── */
    .pagination { display:flex; gap:5px; justify-content:center; margin-top:20px; align-items:center; }
    .pg-btn { padding:5px 11px; border-radius:var(--r); border:1px solid var(--border2); background:var(--surf2); color:var(--text2); font-family:var(--mono); font-size:10px; cursor:pointer; transition:all .15s; }
    .pg-btn.active { background:var(--accent); color:var(--bg); border-color:var(--accent); font-weight:700; }
    .pg-btn:hover:not(.active) { color:var(--text); }
    .pg-ellipsis { color:var(--text3); font-family:var(--mono); font-size:10px; padding:0 4px; }

    /* ── Segment card ── */
    .seg-card { background:var(--surf); border:1px solid var(--border); border-radius:var(--rl); padding:18px; transition:transform .2s; }
    .seg-card:hover { transform:translateY(-2px); }
    .seg-hdr { display:flex; align-items:center; gap:12px; margin-bottom:14px; padding-bottom:12px; border-bottom:1px solid var(--border); }
    .seg-swatch { width:8px; height:40px; border-radius:3px; flex-shrink:0; }
    .seg-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .seg-stat { background:var(--surf2); border-radius:var(--r); padding:10px 12px; border:1px solid var(--border); }
    .seg-stat-label { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:1.5px; margin-bottom:4px; }
    .seg-stat-val { font-family:var(--mono); font-size:16px; font-weight:700; }

    /* ── Location bars ── */
    .loc-row { display:flex; align-items:center; gap:10px; padding:5px 0; }
    .loc-rank { font-family:var(--mono); font-size:8px; color:var(--text3); min-width:18px; text-align:right; }
    .loc-bar-bg { flex:1; height:2px; background:var(--border); border-radius:1px; }
    .loc-bar-fill { height:100%; background:var(--accent); border-radius:1px; opacity:.55; }

    /* ── Mini stat ── */
    .mini-stat { background:var(--surf2); border:1px solid var(--border); border-radius:var(--r); padding:14px 16px; }
    .mini-stat-label { font-family:var(--mono); font-size:7px; color:var(--text3); letter-spacing:2px; margin-bottom:6px; }
    .mini-stat-val { font-family:var(--mono); font-size:20px; font-weight:700; }

    /* ── Empty ── */
    .empty { text-align:center; padding:60px 20px; color:var(--text3); }
    .empty-icon { font-size:36px; margin-bottom:14px; opacity:.4; }
    .empty-text { font-family:var(--mono); font-size:11px; }

    @media(max-width:1280px) { .kpi-grid{grid-template-columns:repeat(3,1fr);} }
    @media(max-width:1000px) { .g2{grid-template-columns:1fr;} .ld-grid{grid-template-columns:repeat(2,1fr);} }
    @media(max-width:800px)  { .g3{grid-template-columns:1fr 1fr;} .lead-title{max-width:280px;} }
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-eyebrow"><span class="live-dot"></span>LIVE INTELLIGENCE</div>
      <div class="brand-logo">Zameen<span>Intel</span></div>
      <div class="brand-sub">KARACHI · REAL ESTATE B2B</div>
    </div>
    <div class="nav-section">
      <div class="nav-label">OVERVIEW</div>
      <button class="nav-link active" onclick="showPage('dashboard',this)"><span class="nav-icon">◈</span>Dashboard</button>
      <button class="nav-link" onclick="showPage('analytics',this)"><span class="nav-icon">◉</span>Analytics</button>
    </div>
    <div class="nav-section">
      <div class="nav-label">LEADS</div>
      <button class="nav-link" onclick="showPage('leads',this)"><span class="nav-icon">⬡</span>All Leads</button>
      <button class="nav-link" onclick="showPage('segments',this)"><span class="nav-icon">▣</span>Segments</button>
    </div>
    <div class="sidebar-footer">
      <div class="sf-line">Zameen.com · Karachi Flats</div>
      <div class="sf-line">Daily scrape + ML scoring</div>
      <div id="sb-stats">
        <div class="sf-kv"><span class="sf-k">TOTAL LEADS</span><span class="sf-v" id="sb-total">—</span></div>
        <div class="sf-kv"><span class="sf-k">TODAY</span><span class="sf-v" id="sb-today">—</span></div>
        <div class="sf-kv"><span class="sf-k">AVG SCORE</span><span class="sf-v" id="sb-score">—</span></div>
      </div>
    </div>
  </aside>

  <main class="main" id="main"></main>
</div>

<script>
// ── Config ────────────────────────────────────────────────────
const API = window.location.hostname === 'localhost'
  ? 'http://localhost:8000'
  : 'https://b2b-lead-intelligence-platform.onrender.com';

const SEG_COLOR = {
  "Budget Area":    "#2d9cff",
  "Mid-Value Area": "#00e5a0",
  "Premium Area":   "#ffc63d",
  "Luxury Area":    "#ff7c3c"
};

const SEG_DESC = {
  "Budget Area":    "Entry-level · High volume · Value seekers",
  "Mid-Value Area": "Mid-range · Growing areas · Solid demand",
  "Premium Area":   "Quality stock · DHA/Clifton · High intent",
  "Luxury Area":    "Ultra-premium · Low inventory · HNW clients"
};

// ── Helpers ───────────────────────────────────────────────────
const fmt = n => {
  if (n == null || n === "" || isNaN(n)) return "–";
  n = Number(n);
  if (n >= 10_000_000) return (n/10_000_000).toFixed(1) + " Cr";
  if (n >= 100_000)    return (n/100_000).toFixed(1) + " L";
  return n.toLocaleString();
};
const fmtPsf  = n => (!n || isNaN(n)) ? "–" : "₨" + Number(n).toLocaleString(undefined,{maximumFractionDigits:0}) + "/sqft";
const fmtArea = n => (!n || isNaN(n)) ? "–" : Number(n).toLocaleString(undefined,{maximumFractionDigits:0}) + " sqft";
const fmtN    = (n,d=1) => (n==null||isNaN(n)) ? "–" : Number(n).toFixed(d);
const scoreColor = s => s >= 70 ? "var(--green)" : s >= 40 ? "var(--yellow)" : "var(--red)";
const scoreLabel = s => s >= 70 ? "HIGH" : s >= 40 ? "MED" : "LOW";
const numStr = s => s ? (String(s).replace(/[^0-9.]/g,'') || "–") : "–";
const san = str => {
  if (!str) return "–";
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
};

async function apiGet(path) {
  try {
    const r = await fetch(API + path);
    if (!r.ok) throw new Error(r.statusText);
    return r.json();
  } catch(e) {
    console.error('API error:', path, e.message);
    return {};
  }
}

// ── State ─────────────────────────────────────────────────────
let state = {
  page: "dashboard",
  f: { page:1, limit:20, sort_by:"lead_score", segment:"", min_score:"", location:"", bedrooms:"", min_price:"", max_price:"" }
};

function showPage(name, btn) {
  state.page = name;
  document.querySelectorAll('.nav-link').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function showPageFiltered(segment) {
  state.f.segment = segment;
  state.f.page = 1;
  showPage('leads', document.querySelectorAll('.nav-link')[2]);
}

// ── Sidebar stats ─────────────────────────────────────────────
async function loadSidebarStats() {
  const s = await apiGet('/api/summary');
  const set = (id, v) => { const el = document.getElementById(id); if(el) el.textContent = v; };
  set('sb-total', s.total_leads != null ? Number(s.total_leads).toLocaleString() : "–");
  set('sb-today', s.today_leads ?? "–");
  set('sb-score', s.avg_lead_score != null ? fmtN(s.avg_lead_score,1) : "–");
}

// ── SVG bar chart ─────────────────────────────────────────────
function svgBars(id, data, key, labelFn, colorFn, valFn, W=360, H=165) {
  const el = document.getElementById(id);
  if (!el || !data?.length) return;
  const valid = data.filter(d => d[key] != null && !isNaN(d[key]));
  if (!valid.length) return;
  const PAD=32, max=Math.max(...valid.map(d=>+d[key]),1);
  const bw = (W-PAD*2)/valid.length;
  const bars = valid.map((d,i) => {
    const val=+d[key], bh=Math.max((val/max)*(H-52),2);
    const x=PAD+i*bw+bw*.12, y=H-bh-24, c=colorFn(d), lbl=labelFn(d);
    return `<rect x="${x}" y="${y}" width="${bw*.76}" height="${bh}" rx="2" fill="${c}" opacity=".8"/>
            <text x="${x+bw*.38}" y="${H-5}" text-anchor="middle" font-size="8" fill="var(--text3)" font-family="Space Mono">${lbl}</text>
            <text x="${x+bw*.38}" y="${y-5}" text-anchor="middle" font-size="8" fill="${c}" font-family="Space Mono">${valFn(val)}</text>`;
  }).join('');
  el.className = 'fade';
  el.innerHTML = `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:100%">${bars}</svg>`;
}

// ── Segment donut ─────────────────────────────────────────────
function renderDonut(id, segsObj) {
  const el = document.getElementById(id);
  if (!el) return;
  const segs = Object.entries(segsObj);
  const total = segs.reduce((a,[,v])=>a+v,0)||1;
  let cum = 0;
  const R=50, cx=68, cy=68;
  const paths = segs.map(([name,val]) => {
    const pct=val/total, start=cum*2*Math.PI-Math.PI/2;
    cum += pct;
    const end=cum*2*Math.PI-Math.PI/2;
    const x1=cx+R*Math.cos(start), y1=cy+R*Math.sin(start);
    const x2=cx+R*Math.cos(end),   y2=cy+R*Math.sin(end);
    return `<path d="M${cx},${cy} L${x1},${y1} A${R},${R} 0 ${pct>.5?1:0},1 ${x2},${y2} Z" fill="${SEG_COLOR[name]||'#888'}" opacity=".85"/>`;
  }).join('');
  const legend = segs.map(([name,val]) => `
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:5px">
      <div style="width:7px;height:7px;border-radius:2px;background:${SEG_COLOR[name]||'#888'};flex-shrink:0"></div>
      <span style="font-size:11px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${name}</span>
      <span style="font-family:var(--mono);font-size:10px;color:var(--text)">${val}</span>
      <span style="font-family:var(--mono);font-size:9px;color:var(--text3)">${((val/total)*100).toFixed(0)}%</span>
    </div>`).join('');
  el.className = 'fade';
  el.innerHTML = `<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
    <svg viewBox="0 0 136 136" style="width:120px;height:120px;flex-shrink:0">
      ${paths}
      <circle cx="${cx}" cy="${cy}" r="24" fill="var(--surf)"/>
      <text x="${cx}" y="${cy+4}" text-anchor="middle" font-size="12" fill="var(--text2)" font-family="Space Mono">${total}</text>
    </svg>
    <div style="flex:1;min-width:130px">${legend}</div>
  </div>`;
}

    <div class="pagination" id="leads-pagination"></div>`;

  const params = new URLSearchParams();
  if (f.page)    params.set('page',     f.page);
  if (f.limit)   params.set('limit',    f.limit);
  if (f.sort_by) params.set('sort_by',  f.sort_by);
  if (f.segment) params.set('segment',  f.segment);
  if (f.min_score !== "" && f.min_score != null) params.set('min_score', f.min_score);
  if (f.location) params.set('location', f.location);

  const data = await apiGet(`/api/leads?${params.toString()}`);
  let leads = data.leads || [];

  // Client-side filters for unsupported API params
  if (f.bedrooms !== "" && f.bedrooms != null) {
    const bd = parseFloat(f.bedrooms);
    leads = leads.filter(l => {
      const b = parseFloat(String(l.bedrooms||'').replace(/[^0-9.]/g,''));
      return !isNaN(b) && b === bd;
    });
  }
  if (f.min_price !== "" && f.min_price != null) {
    leads = leads.filter(l => parseFloat(l.price||0) >= parseFloat(f.min_price));
  }
  if (f.max_price !== "" && f.max_price != null) {

  // Pagination

  const totalPages = Math.min(pages, 10);
  if (totalPages > 1) {
    if (curPage > 1) pHTML += `<button class="pg-btn" onclick="goPage(${curPage-1})">← Prev</button>`;
    for (let p=1; p<=totalPages; p++) {

      }
    }
    if (curPage < totalPages) pHTML += `<button class="pg-btn" onclick="goPage(${curPage+1})">Next →</button>`;
  }
  document.getElementById('leads-pagination').innerHTML = pHTML;
}

            <div><div class="lf-label">AGENCY NAME</div><div class="lf-val">${san(l.agency_name)}</div></div>
            <div>
              <div class="lf-label">VERIFICATION</div>
              <div class="lf-val">${isVer?'<span class="badge badge-verified" style="font-size:10px">✓ Verified Agency</span>':'<span style="color:var(--text3)">Not Verified</span>'}</div>
            </div>
            <div><div class="lf-label">TOTAL AGENT LISTINGS</div><div class="lf-val mono">${l.total_agent_listings != null ? san(String(l.total_agent_listings)) : "–"}</div></div>
          </div>
        </div>

        <div class="ld-section">
          <div class="ld-section-title">CONTACT & LINKS</div>
          <div class="ld-grid">
            <div><div class="lf-label">PHONE</div><div class="lf-val mono">${l.phone_number?`<a href="tel:${san(l.phone_number)}">${san(l.phone_number)}</a>`:"–"}</div></div>
            <div><div class="lf-label">EMAIL</div><div class="lf-val">${l.email?`<a href="mailto:${san(l.email)}">${san(l.email)}</a>`:"–"}</div></div>
            <div><div class="lf-label">LISTING URL</div><div class="lf-val">${l.link?`<a href="${l.link}" target="_blank" rel="noopener">zameen.com ↗</a>`:"–"}</div></div>
            <div><div class="lf-label">AGENCY PROFILE</div><div class="lf-val">${l.agency_url?`<a href="${l.agency_url}" target="_blank" rel="noopener">View Profile ↗</a>`:"–"}</div></div>
          </div>
        </div>

        <div class="lead-actions">
          <span class="cta-label">QUICK ACTIONS</span>
          ${l.link       ?`<a href="${l.link}"       target="_blank" rel="noopener" class="btn btn-accent">↗ View Listing</a>`:''}
          ${l.agency_url ?`<a href="${l.agency_url}" target="_blank" rel="noopener" class="btn btn-ghost">Agency Profile</a>`:''}
          ${l.phone_number?`<a href="tel:${san(l.phone_number)}" class="btn btn-green">📞 ${san(l.phone_number)}</a>`:''}
          ${l.email       ?`<a href="mailto:${san(l.email)}" class="btn btn-ghost">✉ Email Agent</a>`:''}
          <button onclick="copyContact(event,${JSON.stringify({name:l.agent_name,phone:l.phone_number,email:l.email,agency:l.agency_name,price:l.price,location:l.location})})" class="btn btn-ghost" style="margin-left:auto">📋 Copy Contact</button>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleCard(hdr) {
  const body = hdr.nextElementSibling;
  const open = body.style.display === "block";
  body.style.display = open ? "none" : "block";
  const icon = hdr.querySelector('.expand-icon');
  if (icon) icon.textContent = open ? "▾ expand" : "▴ collapse";
}

function copyContact(evt, data) {
  if (!data) return;
  const txt = [
    data.name    ? `Agent: ${data.name}`     : null,
    data.agency  ? `Agency: ${data.agency}`  : null,
    data.phone   ? `Phone: ${data.phone}`    : null,
    data.email   ? `Email: ${data.email}`    : null,
    data.location? `Location: ${data.location}` : null,
    data.price   ? `Price: ${fmt(data.price)}` : null,
  ].filter(Boolean).join('\n');
  navigator.clipboard.writeText(txt).then(() => {
    const btn = evt.currentTarget;
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '📋 Copy Contact', 1600);
  }).catch(() => {});
}

function setFilter(key, val) {
  state.f[key] = val;
  state.f.page = 1;
  renderLeads();
}

function goPage(p) {
  state.f.page = p;
  renderLeads();
  window.scrollTo({top:0,behavior:'smooth'});
}

function resetFilters() {
  state.f = { page:1, limit:20, sort_by:"lead_score", segment:"", min_score:"", location:"", bedrooms:"", min_price:"", max_price:"" };
  renderLeads();
}

// ══════════════════════════════════════════════════════════════
// ANALYTICS
// ══════════════════════════════════════════════════════════════
async function renderAnalytics() {
  const el = document.getElementById('main');
  el.innerHTML = `
    <div class="pg-eyebrow">MARKET INTELLIGENCE</div>
    <div class="pg-title">Analytics</div>
    <div class="pg-sub">Segment performance · Pricing density · Geographic distribution</div>

    <div class="g4" style="margin-bottom:14px">
      <div class="mini-stat skel" style="height:70px" id="ms-1"></div>
      <div class="mini-stat skel" style="height:70px" id="ms-2"></div>
      <div class="mini-stat skel" style="height:70px" id="ms-3"></div>
      <div class="mini-stat skel" style="height:70px" id="ms-4"></div>
    </div>

    <div class="g3">
      <div class="panel"><div class="panel-eyebrow">PRICING</div><div class="panel-title">Avg Price by Segment</div><div id="c-price" style="height:170px" class="skel"></div></div>
      <div class="panel"><div class="panel-eyebrow">QUALITY SCORE</div><div class="panel-title">Avg Lead Score by Segment</div><div id="c-score" style="height:170px" class="skel"></div></div>
      <div class="panel"><div class="panel-eyebrow">PRICE DENSITY</div><div class="panel-title">Avg ₨/Sqft by Segment</div><div id="c-psf" style="height:170px" class="skel"></div></div>
    </div>

    <div class="g2">
      <div class="panel">
        <div class="panel-eyebrow">GEO DISTRIBUTION</div>
        <div class="panel-title">Top 20 Locations by Volume</div>
        <div id="loc-list"><div class="skel" style="height:240px"></div></div>
      </div>
      <div class="panel">
        <div class="panel-eyebrow">VOLUME</div>
        <div class="panel-title">Listing Count per Segment</div>
        <div id="c-count" style="height:170px" class="skel"></div>
      </div>
    </div>

    <div class="tbl-wrap">
      <div class="tbl-hdr"><div><div class="panel-eyebrow">COMPARATIVE</div><div style="font-weight:700;font-size:13px">Segment Statistics</div></div></div>
      <div id="seg-tbl"><div class="skel" style="height:120px;margin:16px"></div></div>
    </div>`;

  const [segs, locs] = await Promise.all([apiGet('/api/trends/segments'), apiGet('/api/trends/locations')]);
  const segsArr = Array.isArray(segs) ? segs : [];

  // Mini stats
  const totalListings = segsArr.reduce((a,s)=>a+(s.count||0),0);
  const avgPsf = segsArr.length ? segsArr.reduce((a,s)=>a+(parseFloat(s.avg_price_per_sqft||0)),0)/segsArr.length : 0;
  const topSeg = segsArr.length ? [...segsArr].sort((a,b)=>(b.count||0)-(a.count||0))[0] : null;
  const topScore = segsArr.length ? [...segsArr].sort((a,b)=>(b.avg_score||0)-(a.avg_score||0))[0] : null;
  [
    { label:"TOTAL LISTINGS", val:totalListings.toLocaleString(), color:"var(--accent)" },
    { label:"AVG ₨/SQFT",     val:avgPsf?"₨"+Math.round(avgPsf).toLocaleString():"–", color:"var(--purple)" },
    { label:"TOP BY VOLUME",  val:topSeg?.market_segment?.replace(' Area','')||"–", color:SEG_COLOR[topSeg?.market_segment]||"var(--text2)" },
    { label:"TOP BY SCORE",   val:topScore?.market_segment?.replace(' Area','')||"–", color:"var(--yellow)" },
  ].forEach((m,i) => {
    const el2 = document.getElementById(`ms-${i+1}`);
    if (el2) { el2.className='mini-stat fade'; el2.innerHTML=`<div class="mini-stat-label">${m.label}</div><div class="mini-stat-val" style="color:${m.color}">${m.val}</div>`; }
  });

  const lf = d => (d.market_segment||"").replace(" Area","").slice(0,7);
  const cf = d => SEG_COLOR[d.market_segment]||"var(--accent)";
  svgBars('c-price', segsArr, 'avg_price',         lf, cf, v=>fmt(v));
  svgBars('c-score', segsArr, 'avg_score',          lf, cf, v=>Math.round(v||0));
  svgBars('c-psf',   segsArr, 'avg_price_per_sqft', lf, cf, v=>v?Math.round(v).toLocaleString():'–');
  svgBars('c-count', segsArr, 'count',              lf, cf, v=>v);

  // Locations
  const locsArr = Array.isArray(locs) ? locs : [];
  const maxLoc = locsArr[0]?.count||1;
  document.getElementById('loc-list').innerHTML = locsArr.length ?
    `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0 24px">
      ${locsArr.slice(0,20).map((l,i)=>`
        <div class="loc-row">
          <span class="loc-rank">${i+1}</span>
          <div style="flex:1;min-width:0">
            <div style="display:flex;justify-content:space-between;margin-bottom:3px">
              <span style="font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px">${san(l.location)||"Unknown"}</span>
              <span style="font-family:var(--mono);font-size:9px;color:var(--accent);margin-left:6px">${l.count}</span>
            </div>
            <div class="loc-bar-bg"><div class="loc-bar-fill" style="width:${(l.count/maxLoc*100).toFixed(0)}%"></div></div>
          </div>
          <span style="font-family:var(--mono);font-size:9px;color:var(--text3);min-width:28px;text-align:right">${fmtN(l.avg_score,0)}</span>
        </div>`).join('')}
    </div>` :
    `<div class="empty"><div class="empty-text">No location data</div></div>`;

  // Segment comparison table
  document.getElementById('seg-tbl').innerHTML = segsArr.length ?
    `<table><thead><tr>
      <th>SEGMENT</th><th>LISTINGS</th><th>AVG PRICE</th><th>AVG ₨/SQFT</th><th>AVG AREA</th><th>AVG BEDS</th><th>AVG BATHS</th><th>AVG SCORE</th>
    </tr></thead><tbody>
      ${segsArr.map(seg => {
        const sc=SEG_COLOR[seg.market_segment]||"var(--text2)";
        return `<tr>
          <td><span class="badge" style="background:${sc}18;color:${sc};border:1px solid ${sc}30">${seg.market_segment||"–"}</span></td>
          <td style="font-family:var(--mono)">${(seg.count||"–").toLocaleString?.()}</td>
          <td style="font-family:var(--mono);color:var(--accent)">${fmt(seg.avg_price)}</td>
          <td style="font-family:var(--mono);color:var(--purple)">${fmtPsf(seg.avg_price_per_sqft)}</td>
          <td style="font-family:var(--mono)">${fmtArea(seg.avg_area_sqft)}</td>
          <td style="font-family:var(--mono)">${fmtN(seg.avg_bedrooms,1)}</td>
          <td style="font-family:var(--mono)">${fmtN(seg.avg_bathrooms,1)}</td>
          <td>
            <div class="score-bar-wrap">
              <div class="score-bar-bg"><div class="score-bar-fill" style="width:${Math.round(seg.avg_score||0)}%;background:${scoreColor(seg.avg_score||0)}"></div></div>
              <span style="font-family:var(--mono);font-size:10px;color:${scoreColor(seg.avg_score||0)}">${fmtN(seg.avg_score,1)}</span>
            </div>
          </td>
        </tr>`;
      }).join('')}
    </tbody></table>` :
    `<div class="empty"><div class="empty-text">No segment data</div></div>`;
}

// ══════════════════════════════════════════════════════════════
// SEGMENTS
// ══════════════════════════════════════════════════════════════
async function renderSegments() {
  const el = document.getElementById('main');
  el.innerHTML = `
    <div class="pg-eyebrow">MARKET SEGMENTATION</div>
    <div class="pg-title">Segment Intelligence</div>
    <div class="pg-sub">KMeans K=4 clustering · Price tiers · Opportunity scoring</div>
    <div id="seg-cards" class="g2eq">
      ${[...Array(4)].map(()=>`<div class="skel" style="height:220px;border-radius:var(--rl)"></div>`).join('')}
    </div>`;

  const segs = await apiGet('/api/trends/segments');
  const segsArr = Array.isArray(segs) ? segs : [];

  document.getElementById('seg-cards').innerHTML = segsArr.length ?
    segsArr.map(seg => {
      const sc=SEG_COLOR[seg.market_segment]||"var(--text2)";
      const desc=SEG_DESC[seg.market_segment]||"";
      return `<div class="seg-card fade" style="border-top:2px solid ${sc}">
        <div class="seg-hdr">
          <div class="seg-swatch" style="background:${sc}"></div>
          <div>
            <div style="font-weight:800;font-size:15px">${seg.market_segment||"Unknown"}</div>
            <div style="font-size:11px;color:var(--text2);margin-top:2px">${desc}</div>
          </div>
        </div>
        <div class="seg-stats">
          <div class="seg-stat"><div class="seg-stat-label">LISTINGS</div><div class="seg-stat-val" style="color:${sc}">${(seg.count||"–").toLocaleString?.()}</div></div>
          <div class="seg-stat"><div class="seg-stat-label">AVG SCORE</div><div class="seg-stat-val" style="color:${scoreColor(seg.avg_score||0)}">${fmtN(seg.avg_score,1)}</div></div>
          <div class="seg-stat"><div class="seg-stat-label">AVG PRICE</div><div class="seg-stat-val" style="color:var(--accent);font-size:14px">${fmt(seg.avg_price)}</div></div>
          <div class="seg-stat"><div class="seg-stat-label">AVG ₨/SQFT</div><div class="seg-stat-val" style="color:var(--purple);font-size:14px">${fmtPsf(seg.avg_price_per_sqft)}</div></div>
          <div class="seg-stat"><div class="seg-stat-label">AVG AREA</div><div class="seg-stat-val" style="font-size:13px">${fmtArea(seg.avg_area_sqft)}</div></div>
          <div class="seg-stat"><div class="seg-stat-label">AVG BEDS</div><div class="seg-stat-val" style="font-size:13px">${fmtN(seg.avg_bedrooms,1)}</div></div>
        </div>
        <div style="margin-top:12px">
          <button class="btn btn-ghost" onclick="showPageFiltered('${seg.market_segment}')" style="width:100%;justify-content:center;font-size:10px">
            Browse ${seg.count||''} listings →
          </button>
        </div>
      </div>`;
    }).join('') :
    `<div style="grid-column:1/-1"><div class="empty"><div class="empty-icon">▣</div><div class="empty-text">Segment data not yet available</div></div></div>`;
}

// ── Router ────────────────────────────────────────────────────
function render() {
  document.getElementById('main').innerHTML = '';
  if      (state.page==='dashboard') renderDashboard();
  else if (state.page==='leads')     renderLeads();
  else if (state.page==='analytics') renderAnalytics();
  else if (state.page==='segments')  renderSegments();
}

loadSidebarStats();
render();
</script>
